databases:
  - name: shadowseek-db
    plan: basic-256mb

services:
  - type: web
    name: shadowseek
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PUBLIC_BASE_URL
        value: https://shadowseek.onrender.com
      - key: APP_BASE_URL
        value: https://shadowseek.onrender.com
      - key: BILLING_GATING_ENABLED
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: shadowseek-db
          property: connectionString
