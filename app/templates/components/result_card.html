<div class="result-card">
    <img src="{{ result.profile_pic or url_for('static', filename='img/default_avatar.png') }}" alt="Avatar" class="result-avatar">
    <div class="result-info">
        <div class="result-title">{{ result.username }}</div>
        <div class="result-platform">{{ result.platform }}</div>
        <div class="result-bio">{{ result.bio or '' }}</div>
        <a href="{{ result.profile_url }}" target="_blank" class="result-link">Öffnen</a>
    </div>
</div>
