<nav class="navbar">
    <a class="navbar-logo" href="/" aria-label="Zur ShadowSeek-Startseite">
        ShadowSeek
    </a>
    <button class="navbar-hamburger" id="navbar-hamburger" aria-label="Menü öffnen" aria-controls="navbar-menu" aria-expanded="false">
        <span></span><span></span><span></span>
    </button>
    <div class="navbar-center" id="navbar-menu">
        <a href="/">Home</a>
        <a href="/search" data-feature="search">Suche</a>
        <a href="/pulse" data-feature="pulse">Pulse</a>
        {% if session.get('is_admin') %}
            <a href="/admin">Admin</a>
        {% endif %}
    </div>
    <div class="navbar-right">
        {% if not session.get('user_id') %}
            <button id="login-btn">Anmelden</button>
            <button id="register-btn">Registrieren</button>
        {% else %}
            <a href="/billing">Abo</a>
            <a href="/profile">Profil</a>
            <a href="/auth/logout">Logout</a>
        {% endif %}
    </div>
</nav>
<script>
// Hamburger Toggle
document.addEventListener('DOMContentLoaded', function() {
  const btn = document.getElementById('navbar-hamburger');
  const menu = document.getElementById('navbar-menu');
  if (btn && menu) {
    btn.addEventListener('click', function() {
      const expanded = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', !expanded);
      menu.classList.toggle('navbar-menu-open');
    });
  }
});
</script>
