<div id="chatbot-widget" class="chatbot-widget" hidden aria-hidden="true">
    <div class="chatbot-header">
        <span>ShadowSeek Assistant</span>
        <div class="chatbot-controls">
            <button id="chatbot-minimize" type="button" aria-label="Assistant minimieren">_</button>
            <button id="chatbot-close" type="button" aria-label="Assistant schliessen">X</button>
        </div>
    </div>
    <div id="chatbot-messages" class="chatbot-messages" aria-live="polite"></div>
    <form id="chatbot-form" data-endpoint="{{ url_for('chatbot.assistant_reply') }}">
        <input type="text" id="chatbot-input" placeholder="Frage stellen..." autocomplete="off">
        <button id="chatbot-send" type="submit">Senden</button>
    </form>
</div>
