{% extends "base.html" %}
{% block title %}ShadowSeek – Geschützte Suche{% endblock %}
{% block content %}
<div class="search-landing">
    <div class="search-landing-inner">
        <div class="search-branding">ShadowSeek</div>
        <div class="search-claim">
            <span class="claim-main">Finde alles. Sofort.</span>
            <span class="claim-sub">Web & Profile – wie Google, nur besser.</span>
        </div>
        <form id="landing-search-form" class="landing-search-form" method="GET" action="/search" autocomplete="off">
            <input type="text" name="query" class="landing-search-input" placeholder="Suche im Web oder nach Profilen..." autofocus required>
            <button type="submit" class="landing-search-btn">Suche</button>
        </form>
    </div>
</div>
{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">{% endblock %}
{% block extra_js %}<script src="{{ url_for('static', filename='js/landing.js') }}"></script>{% endblock %}
