{% extends "base.html" %}
{% block title %}ShadowSeek – Geschützte Suche{% endblock %}
{% block content %}
<div class="search-landing">
    <div class="search-landing-inner">
        <div class="search-branding">ShadowSeek</div>
        <div class="search-claim">
            <span class="claim-main">Finde alles. Sofort.</span>
            <span class="claim-sub">Web & Profile – wie Google, nur besser.</span>
        </div>
        <form id="landing-search-form" class="landing-search-form" method="GET" action="/" autocomplete="off">
            <div class="searchbar-wrapper">
                <select id="engine-select" class="engine-select" name="engine">
                    <option value="shadowseek">ShadowSeek</option>
                    <option value="google">Google</option>
                    <option value="bing">Bing</option>
                    <option value="duckduckgo">DuckDuckGo</option>
                </select>
                <input type="text" name="query" class="landing-search-input" id="search-autocomplete" placeholder="Suche im Web oder nach Profilen..." autocomplete="off" autofocus required>
                <div id="autocomplete-list" class="autocomplete-items"></div>
            </div>
            <button type="submit" class="landing-search-btn">Suche</button>
        </form>
    </div>
</div>
{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">{% endblock %}
{% block extra_js %}<script src="{{ url_for('static', filename='js/landing.js') }}"></script>{% endblock %}
