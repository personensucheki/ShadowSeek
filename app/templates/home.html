{% extends "base.html" %}
{% block title %}ShadowSeek – Geschützte Suche{% endblock %}
{% block content %}
<div class="google-home-bg">
    <div class="google-home-center">
        <div class="google-home-logo">ShadowSeek</div>
        <form id="landing-search-form" class="google-home-search-form" method="GET" action="/search" autocomplete="off">
            <input type="text" name="query" class="google-home-search-input" placeholder="Suche im Web oder nach Profilen..." autofocus required>
            <button type="submit" class="google-home-search-btn">Suche</button>
        </form>
    </div>
</div>
{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">{% endblock %}
{% block extra_js %}<script src="{{ url_for('static', filename='js/landing.js') }}"></script>{% endblock %}
