{% extends "base.html" %}
{% block title %}Profil – ShadowSeek{% endblock %}
{% block content %}
<div class="card neon-card" style="max-width:520px;margin:2em auto 0 auto;padding:2.5em 2em 2em 2em;background:#111;border-radius:18px;box-shadow:0 0 32px #00FF9F44,0 0 12px #FF00FF33;">
    <h2 style="color:#FF00FF;font-size:2em;letter-spacing:0.08em;margin-bottom:1.2em;text-align:center;">PROFILE</h2>
    <form id="profile-form" autocomplete="off">
        <div class="form-group">
            <label for="display_name">Display Name</label>
            <input type="text" name="display_name" id="display_name" value="{{ current_user.display_name or '' }}" placeholder="z.B. NeonHunter" style="width:100%">
        </div>
        <div class="form-group">
            <label for="email">E-Mail</label>
            <input type="email" name="email" id="email" value="{{ current_user.email }}" style="width:100%">
        </div>
        <div class="form-group">
            <label for="password">Neues Passwort</label>
            <input type="password" name="password" id="password" placeholder="Neues Passwort (optional)" style="width:100%">
        </div>
        <div class="form-group">
            <label for="bio">Bio</label>
            <textarea name="bio" id="bio" rows="3" placeholder="Sag etwas über dich ..." style="width:100%">{{ current_user.bio or '' }}</textarea>
        </div>
        <button type="submit" class="profile-save-btn" style="width:100%;margin-top:1.2em;background:linear-gradient(90deg,#FF00FF,#00FF9F);color:#fff;font-weight:700;font-size:1.1em;border:none;border-radius:8px;padding:0.7em 0;box-shadow:0 0 16px #00FF9F55,0 0 8px #FF00FF33;cursor:pointer;">SAVE PROFILE</button>
        <div id="profile-message" style="margin-top:1.2em;text-align:center;"></div>
    </form>
</div>
{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">{% endblock %}
