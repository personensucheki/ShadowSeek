{% extends "base.html" %}
{% block title %}Passwort zurücksetzen{% endblock %}
{% block content %}
<div style="max-width:420px;margin:60px auto 0;background:#23272a;padding:36px 32px 28px 32px;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,0.5);">
    <h2 style="color:#00f0ff;">Passwort zurücksetzen</h2>
    <form method="POST" autocomplete="off">
        <input type="password" name="password" placeholder="Neues Passwort" required style="width:100%;padding:12px;margin-bottom:14px;border-radius:7px;border:1px solid #334155;background:#16213a;color:#e0e0e0;">
        <input type="password" name="password2" placeholder="Passwort wiederholen" required style="width:100%;padding:12px;margin-bottom:18px;border-radius:7px;border:1px solid #334155;background:#16213a;color:#e0e0e0;">
        <button type="submit" class="btn-filled" style="width:100%;">Zurücksetzen</button>
    </form>
</div>
{% endblock %}
