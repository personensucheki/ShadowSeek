{% extends "base.html" %}

{% block title %}ShadowSeek - Suche{% endblock %}

{% block content %}
<style>
    .search-hero {
        background: linear-gradient(120deg, #23272a 60%, #181a1b 100%);
        border-radius: 18px;
        padding: 38px 24px 32px;
        margin: 0 auto 40px auto;
        max-width: 800px;
        box-shadow: 0 6px 32px rgba(0,0,0,0.22);
    }
    .search-fields {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        justify-content: center;
    }
    .search-fields input {
        background: #181a1b;
        color: #f1f1f1;
        border: none;
        border-radius: 10px;
        padding: 16px 18px;
        font-size: 1.05em;
        min-width: 180px;
        outline: none;
    }
    .search-fields input:focus {
        /* ...existing CSS... */
    }


<div class="search-hero">
    <form id="agent-search-form" autocomplete="off">
        <div class="search-fields">
            <input type="text" name="username" id="username" placeholder="Username" required>
            <input type="text" name="firstname" id="firstname" placeholder="Vorname">
            <input type="text" name="lastname" id="lastname" placeholder="Nachname">
            <input type="text" name="city" id="city" placeholder="Wohnort">
            <input type="email" name="email" id="email" placeholder="E-Mail">
        </div>
        <button class="search-btn" type="submit">Suchen</button>
    </form>
</div>

<div id="loading-screen" style="display:none; text-align:center; padding:40px;">
    <h3>🔍 ShadowSeek Agent wird aktiviert...</h3>
    <p id="status">Durchsuche Social Media Netzwerke...</p>
    <div class="loader" style="margin:20px auto;"></div>
</div>

{% if username %}
<div id="loading-screen" style="text-align:center; padding:40px;">
    <h3>🔍 ShadowSeek Agent wird aktiviert...</h3>
    <p id="status">Durchsuche Social Media Netzwerke...</p>
    <div class="loader" style="margin:20px auto;"></div>
</div>
</script>
<script>
// Tabs
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');
    });
});

// ShadowSeek Agent - Final Version
function startSearch(username) {
    const loadingScreen = document.getElementById('loading-screen');
    const status = document.getElementById('status');
    const tabs = document.querySelector('.tabs');
    const tabContents = document.querySelectorAll('.tab-content');

    const statusTexts = [
        'Initialisiere ShadowSeek Agent...',
        'Durchsuche Social Media Netzwerke...',
        'Scanne Dating & Adult Plattformen...',
        'Analysiere Deep-Web Verbindungen...',
        'Berechne Match-Scores...'
    ];

    let idx = 0;
    status.textContent = statusTexts[0];
    loadingScreen.style.display = 'block';
    tabs.style.display = 'none';
    tabContents.forEach(tc => tc.style.display = 'none');

    const interval = setInterval(() => {
        idx = (idx + 1) % statusTexts.length;
        status.textContent = statusTexts[idx];
    }, 750);

    setTimeout(() => {
        loadingScreen.style.display = 'none';
        tabs.style.display = 'flex';
        tabContents.forEach(tc => tc.style.display = '');
        clearInterval(interval);
        window.scrollTo({ top: tabs.offsetTop - 80, behavior: 'smooth' });
    }, 3200);
}

document.getElementById('agent-search-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    if (username) {
        startSearch(username);

        setTimeout(() => {
            window.location.href = `/search?username=${encodeURIComponent(username)}`;
        }, 3200);
    }
});

// Bildersuche bleibt unverändert
document.getElementById('image-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const query = document.getElementById('image-input').value || 'person';
    const grid = document.getElementById('image-grid');

    grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#8ab4f8;">Lade Bilder...</p>';

    fetch(`https://picsum.photos/v2/list?limit=12`)
        .then(res => res.json())
        .then(data => {
            grid.innerHTML = '';
            data.forEach(item => {
                const img = document.createElement('div');
                img.className = 'image-card';
                img.innerHTML = `<img src="https://picsum.photos/id/${item.id}/400/300" alt="${query}">`;
                img.onclick = () => window.open(`https://picsum.photos/id/${item.id}/1200`, '_blank');
                grid.appendChild(img);
            });
        });
});
</script>
</script>

<!-- Dating & Adult Tab -->
<div class="tab-content" id="dating">
    <div class="results-grid">
        {% set dating_results = categorized_results['dating'] if categorized_results and 'dating' in categorized_results else [] %}
        {% set adult_results = categorized_results['adult'] if categorized_results and 'adult' in categorized_results else [] %}
        {% set combined_results = dating_results + adult_results %}
        {% if combined_results %}
            {% for profile in combined_results %}
            <div class="result-card">
                <div class="profile-name">@{{ profile.username }}</div>
                <div class="platform">{{ profile.platform }}</div>
                <div style="background:#333; height:6px; border-radius:3px; margin:10px 0;">
                    <div style="background:#8ab4f8; width:89%; height:6px; border-radius:3px;"></div>
                </div>
                <p style="font-size:0.9em; color:#8ab4f8;">89% Match</p>
                <a href="{{ profile.profile_url }}" class="profile-btn" target="_blank">Zum Profil</a>
            </div>
            {% endfor %}
        {% else %}
            <p style="grid-column: 1/-1; text-align:center; color:#8ab4f8;">Keine Ergebnisse gefunden.</p>
        {% endif %}
    </div>
</div>
