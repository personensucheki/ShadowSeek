{% extends "base.html" %}

{% block title %}ShadowSeek - Suche{% endblock %}

{% block content %}
<style>
	.search-hero { 
		background: linear-gradient(120deg, #23272a 60%, #181a1b 100%); 
		border-radius: 18px; 
		padding: 38px 24px 32px; 
		margin: 40px auto; 
		max-width: 800px; 
		box-shadow: 0 6px 32px rgba(0,0,0,0.22); 
	}
	.search-fields { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
	.search-fields input { 
		background: #181a1b; 
		color: #f1f1f1; 
		border: none; 
		border-radius: 10px; 
		padding: 16px 18px; 
		font-size: 1.05em; 
		min-width: 180px; 
		outline: none; 
	}
	.search-fields input:focus { box-shadow: 0 0 0 2px #8ab4f8; }
	.search-btn { 
		background: #8ab4f8; 
		color: #181a1b; 
		border: none; 
		border-radius: 10px; 
		padding: 16px 36px; 
		font-size: 1.15em; 
		font-weight: bold; 
		cursor: pointer; 
	}
	.loading {
		display: none;
		text-align: center;
		color: #00f0ff;
		font-size: 1.2em;
		margin-top: 30px;
	}
</style>

<div class="search-hero">
	<form method="POST" action="/search" id="search-form">
		{{ csrf_token() }}
		<div class="search-fields">
			<input type="text" name="username" placeholder="Username" required>
			<input type="text" name="firstname" placeholder="Vorname">
			<input type="text" name="lastname" placeholder="Nachname">
			<input type="text" name="city" placeholder="Wohnort">
			<input type="email" name="email" placeholder="E-Mail">
		</div>
		<button type="submit" class="search-btn" id="search-button">Suchen</button>
	</form>
</div>

<div id="loading" class="loading">
	<div>🔍 ShadowSeek Agent wird initialisiert...</div>
	<div style="margin-top:12px;">Durchsuche Social Media & Adult Plattformen...</div>
</div>

<script>
document.getElementById('search-form').addEventListener('submit', function() {
	document.getElementById('loading').style.display = 'block';
	document.getElementById('search-button').style.display = 'none';
});
</script>
{% endblock %}
