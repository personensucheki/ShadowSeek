<script>
document.getElementById('search-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = '<p style="text-align:center;color:#00f0ff;font-size:1.2em;">🔍 Suche läuft...</p>';

    const formData = new FormData(this);
    const data = Object.fromEntries(formData);

    try {
        const res = await fetch('/api/search', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ query: data.query })
        });
        
        const result = await res.json();

        if (result && result.categorized_results) {
            let html = '';
            
            for (const [category, profiles] of Object.entries(result.categorized_results)) {
                html += `<h2 style="color:#00f0ff;margin:30px 0 15px 10px;">${category}</h2>`;
                
                for (const p of profiles) {
                    html += `
                        <div class="profile-card">
                            <img src="/static/img/default-profile.png" alt="Profil">
                            <div class="profile-info">
                                <h3>${p.username} <span style="color:#666">@${p.platform}</span></h3>
                                <p>Match: <span class="score">${p.match_score}%</span></p>
                                <a href="${p.profile_url}" target="_blank" style="color:#4d9fff;">Profil öffnen →</a>
                            </div>
                        </div>`;
                }
            }
            
            resultsDiv.innerHTML = html || '<p style="text-align:center;color:#ff4d4d;">Keine Ergebnisse gefunden.</p>';
        } else {
            resultsDiv.innerHTML = '<p style="text-align:center;color:#ff4d4d;">Keine Ergebnisse gefunden.</p>';
        }
    } catch (err) {
        console.error(err);
        resultsDiv.innerHTML = '<p style="text-align:center;color:#ff4d4d;">Fehler bei der Suche.</p>';
    }
});
</script>
