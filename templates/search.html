{% extends "base.html" %}

{% block title %}ShadowSeek - Suche{% endblock %}

{% block content %}
<style>
  .search-hero {
    background: linear-gradient(120deg, #23272a 60%, #181a1b 100%);
    border-radius: 18px;
    padding: 38px 24px 32px;
    margin: 40px auto;
    max-width: 800px;
    box-shadow: 0 6px 32px rgba(0,0,0,0.22);
  }
  .search-fields {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
  }
  .search-fields input {
    background: #181a1b;
    color: #f1f1f1;
    border: none;
    border-radius: 10px;
    padding: 16px 18px;
    font-size: 1.05em;
    min-width: 180px;
    outline: none;
  }
  .search-fields input:focus {
    box-shadow: 0 0 0 2px #8ab4f8;
  }
  .search-btn {
    background: #8ab4f8;
    color: #181a1b;
    border: none;
    border-radius: 10px;
    padding: 16px 36px;
    font-size: 1.15em;
    font-weight: bold;
    cursor: pointer;
  }
  .profile-card {
    background: #23272a;
    border-radius: 14px;
    padding: 22px 28px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 22px;
    transition: all 0.3s;
  }
  .profile-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  .profile-card img {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #00f0ff;
  }
  .profile-info h3 {
    margin: 0 0 6px 0;
    color: #00f0ff;
    font-size: 1.2em;
  }
  .profile-info p {
    margin: 0;
    color: #b0b8c1;
    font-size: 0.95em;
  }
  .score {
    font-size: 1.3em;
    font-weight: bold;
    color: #00f0ff;
  }
</style>

<div class="search-hero">
  <form id="search-form">
    <div class="search-fields">
      <input type="text" name="username" placeholder="Username" required>
      <input type="text" name="firstname" placeholder="Vorname">
      <input type="text" name="lastname" placeholder="Nachname">
      <input type="text" name="city" placeholder="Wohnort">
      <input type="email" name="email" placeholder="E-Mail">
    </div>
    <button type="submit" class="search-btn" style="margin-top:20px;">Suchen</button>
  </form>
</div>

<div id="results" style="max-width:900px; margin:40px auto;"></div>

<script>
document.getElementById('search-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = '<p style="text-align:center;color:#00f0ff;">🔍 Suche läuft...</p>';

    const formData = new FormData(this);
    const data = Object.fromEntries(formData);

    try {
        const res = await fetch('/api/search', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ query: data })
        });
        
        const result = await res.json();

        if (result?.categorized_results) {
            let html = '';
        for (const [category, profiles] of Object.entries(result.categorized_results)) {
                html += `<h2 style="color:#00f0ff;margin:40px 0 20px 10px;">${category}</h2>`;
                
                for (const p of profiles) {
                    html += `
                        <div class="profile-card">
                            <img src="/static/img/default-profile.png" alt="Profil">
                            <div class="profile-info">
                                <h3>${p.username} <span style="color:#666">@${p.platform}</span></h3>
                                <p>Match: <span class="score">${p.match_score}%</span></p>
                                <a href="${p.profile_url}" target="_blank" style="color:#4d9fff;">Profil öffnen →</a>
                            </div>
                        </div>`;
                }
            }
            resultsDiv.innerHTML = html || '<p style="text-align:center;color:#ff4d4d;">Keine Ergebnisse gefunden.</p>';
        } else {
            resultsDiv.innerHTML = '<p style="text-align:center;color:#ff4d4d;">Keine Ergebnisse gefunden.</p>';
        }
    } catch (err) {
        console.error(err);
        resultsDiv.innerHTML = '<p style="text-align:center;color:#ff4d4d;">Fehler bei der Suche.</p>';
    }
});
</script>
{% endblock %}
