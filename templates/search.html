{% extends "base.html" %}

{% block title %}Suche | ShadowSeek{% endblock %}

{% block content %}
<div style="max-width:900px;margin:0 auto;padding:40px 0 30px 0;">
    <form id="search-form" style="display:flex;gap:16px;align-items:center;justify-content:center;">
        <input type="text" name="query" placeholder="Suche nach Username, Plattform..." style="flex:1;padding:18px 28px;font-size:1.2em;border-radius:30px;border:none;background:#23272a;color:#f1f1f1;outline:none;" required>
        <button type="submit" style="background:#00f0ff;color:#0a0c14;border:none;padding:14px 38px;border-radius:30px;font-weight:700;font-size:1.1em;cursor:pointer;">Suchen</button>
    </form>

    <div class="filterbar" style="margin:32px 0 18px 0;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
        <button class="filter-btn" data-cat="all">Alle</button>
        <button class="filter-btn" data-cat="Social Media">Social Media</button>
        <button class="filter-btn" data-cat="Dating & Adult">Dating & Adult</button>
        <button class="filter-btn" data-cat="Deep Search">Deep Search</button>
    </div>

    <div id="results"></div>
</div>
<style>
.profile-card {
    background:#23272a;
    border-radius:18px;
    box-shadow:0 4px 18px rgba(0,0,0,0.18);
    display:flex;
    align-items:center;
    gap:22px;
    padding:22px 28px;
    margin-bottom:18px;
    transition:box-shadow 0.18s,transform 0.18s;
}
.profile-card:hover {
    box-shadow:0 8px 32px rgba(0,240,255,0.18);
    transform:translateY(-2px) scale(1.01);
}
.profile-card img {
    width:64px;height:64px;border-radius:50%;background:#181a1b;
}
.profile-info h3 {margin:0 0 6px 0;font-size:1.18em;}
.profile-info .score {color:#00f0ff;font-weight:bold;}
.filter-btn {
    background:#334155;color:#94a3b8;padding:8px 18px;border-radius:30px;font-size:0.97rem;border:none;cursor:pointer;transition:background 0.18s,color 0.18s;}
.filter-btn:hover,.filter-btn.active{background:#00f0ff;color:#0a0c14;}
</style>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('search-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = '<p style="text-align:center;color:#00f0ff;font-size:1.2em;">🔍 Suche läuft...</p>';
    const formData = new FormData(this);
    const data = Object.fromEntries(formData);
    try {
        const res = await fetch('/api/search', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ query: data.query })
        });
        const result = await res.json();
        window._searchResults = result.categorized_results || {};
        renderResults();
    } catch (err) {
        resultsDiv.innerHTML = '<p style="text-align:center;color:#ff4d4d;">Fehler bei der Suche.</p>';
    }
});

function renderResults(filterCat) {
    const resultsDiv = document.getElementById('results');
    const results = window._searchResults || {};
    let html = '';
    for (const [category, profiles] of Object.entries(results)) {
        if (filterCat && filterCat !== 'all' && category !== filterCat) continue;
        html += `<h2 style="color:#00f0ff;margin:30px 0 15px 10px;">${category}</h2>`;
        for (const p of profiles) {
            html += `
                <div class="profile-card">
                    <img src="/static/img/default-profile.png" alt="Profil">
                    <div class="profile-info">
                        <h3>${p.username} <span style="color:#666">@${p.platform}</span></h3>
                        <p>Match: <span class="score">${p.match_score}%</span></p>
                        <a href="${p.profile_url}" target="_blank" style="color:#4d9fff;">Profil öffnen →</a>
                    </div>
                </div>`;
        }
    }
    resultsDiv.innerHTML = html || '<p style="text-align:center;color:#ff4d4d;">Keine Ergebnisse gefunden.</p>';
}

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        renderResults(btn.dataset.cat);
    });
});
</script>
{% endblock %}
