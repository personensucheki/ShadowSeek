<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShadowSeek{% endblock %}</title>
    
 <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6541606308707742"
     crossorigin="anonymous"></script>
    
    <link rel="stylesheet" href="/static/css/main.css?v=1">
    <style>
        body { margin:0; font-family:'Segoe UI',Arial,sans-serif; background:#181a1b; color:#f1f1f1; }
        .navbar { display:flex; align-items:center; justify-content:space-between; background:#23272a; padding:0 2vw; height:60px; }
        .navbar-logo { font-size:1.6em; font-weight:bold; color:#00f0ff; }
        .navbar-center a { color:#f1f1f1; text-decoration:none; padding:8px 14px; }
        .navbar-center a:hover { background:#31363b; border-radius:4px; }
        .world-bg { position:fixed; top:0; left:0; width:100%; height:100%; background:url('/static/img/worldmap.svg') center/cover no-repeat; opacity:0.18; z-index:-1; pointer-events:none; }
    </style>
</head>
<body>

        <!-- Login Modal -->
        <div id="modal-login" class="modal-overlay" tabindex="-1" hidden>
            <div class="modal-dialog">
                <button class="modal-close" onclick="closeModal('modal-login')">&times;</button>
                <h2>Anmelden</h2>
                <form method="POST" action="/login" autocomplete="off">
                    <input type="text" name="username" placeholder="Benutzername" required autofocus>
                    <input type="password" name="password" placeholder="Passwort" required>
                    <button type="submit">Anmelden</button>
                </form>
                <div style="margin-top:18px;text-align:right;">
                    <a href="#" onclick="showForgotModal();return false;">Passwort vergessen?</a>
                </div>
            </div>
        </div>

        <!-- Registrierung Modal -->
        <div id="modal-register" class="modal-overlay" tabindex="-1" hidden>
            <div class="modal-dialog">
                <button class="modal-close" onclick="closeModal('modal-register')">&times;</button>
                <h2>Registrieren</h2>
                <form method="POST" action="/register" autocomplete="off">
                    <input type="text" name="username" placeholder="Benutzername" required autofocus>
                    <input type="email" name="email" placeholder="E-Mail" required>
                    <input type="password" name="password" placeholder="Passwort" required>
                    <button type="submit">Registrieren</button>
                </form>
            </div>
        </div>

        <!-- Passwort vergessen Modal -->
        <div id="modal-forgot" class="modal-overlay" tabindex="-1" hidden>
            <div class="modal-dialog">
                <button class="modal-close" onclick="closeModal('modal-forgot')">&times;</button>
                <h2>Passwort vergessen</h2>
                <form method="POST" action="/forgot-password" autocomplete="off">
                    <input type="email" name="email" placeholder="E-Mail" required autofocus>
                    <button type="submit">Reset-Link senden</button>
                </form>
            </div>
        </div>

        <style>
            .modal-overlay {
                position:fixed;top:0;left:0;width:100vw;height:100vh;
                background:rgba(24,26,27,0.82);z-index:2000;display:flex;align-items:center;justify-content:center;
                transition:background 0.2s;
            }
            .modal-overlay[hidden] { display:none; }
            .modal-dialog {
                background:#23272a;padding:38px 32px 28px 32px;border-radius:18px;box-shadow:0 8px 32px rgba(0,0,0,0.45);min-width:320px;max-width:90vw;position:relative;
                display:flex;flex-direction:column;gap:18px;
            }
            .modal-dialog h2 {margin:0 0 10px 0;font-size:1.5em;color:#00f0ff;}
            .modal-dialog form {display:flex;flex-direction:column;gap:14px;}
            .modal-dialog input {padding:12px 16px;border-radius:8px;border:none;background:#181a1b;color:#f1f1f1;font-size:1em;}
            .modal-dialog button[type=submit] {background:#00f0ff;color:#0a0c14;border:none;padding:12px 0;border-radius:8px;font-weight:bold;font-size:1.1em;cursor:pointer;transition:background 0.18s;}
            .modal-dialog button[type=submit]:hover {background:#00bcd4;}
            .modal-close {
                position:absolute;top:12px;right:16px;background:none;border:none;font-size:1.5em;color:#00f0ff;cursor:pointer;z-index:2;
            }
            .modal-dialog a {color:#60a5fa;text-decoration:none;}
            .modal-dialog a:hover {text-decoration:underline;}
        </style>

        <script>
        // Modal-Logik
        function showLoginModal() {
            openModal('modal-login');
        }
        function showRegisterModal() {
            openModal('modal-register');
        }
        function showForgotModal() {
            closeModal('modal-login');
            setTimeout(()=>openModal('modal-forgot'), 180);
        }
        function openModal(id) {
            document.getElementById(id).removeAttribute('hidden');
            setTimeout(()=>{
                document.getElementById(id).focus();
            }, 50);
        }
        function closeModal(id) {
            document.getElementById(id).setAttribute('hidden','');
        }
        // Schließen per Overlay-Klick
        document.addEventListener('click', function(e) {
            if (e.target.classList && e.target.classList.contains('modal-overlay')) {
                closeModal(e.target.id);
            }
        });
        // Schließen per ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                ['modal-login','modal-register','modal-forgot'].forEach(id => closeModal(id));
            }
        });
        </script>
    <nav class="navbar">
        <div class="navbar-logo">ShadowSeek</div>
        <div class="navbar-center">
            <a href="/">Home</a>
            <a href="/search">Suche</a>
            <a href="/admin">Admin</a>
        </div>
        <div class="navbar-right">
            <button onclick="showLoginModal()" style="background:transparent;border:1px solid #00f0ff;color:#00f0ff;padding:8px 18px;border-radius:6px;">Anmelden</button>
            <button onclick="showRegisterModal()" style="background:#00f0ff;color:#0a0c14;border:none;padding:8px 18px;border-radius:6px;">Registrieren</button>
        </div>
    </nav>

    <div class="world-bg"></div>

    <main style="padding-top:90px;">
        {% block content %}{% endblock %}
    </main>

    <button id="chat-toggle" style="position:fixed;bottom:30px;right:30px;width:68px;height:68px;border-radius:50%;background:#00f0ff;color:#0a0c14;border:none;font-size:28px;box-shadow:0 0 30px rgba(0,240,255,0.7);cursor:pointer;z-index:999;">💬</button>

    <!-- Chatbot Widget UI (Basis) -->
    <div id="chatbot-widget" hidden>
        <div class="chatbot-header">
            <span>Chatbot</span>
            <button onclick="document.getElementById('chatbot-widget').setAttribute('hidden','')" style="background:none;border:none;font-size:1.3em;color:#0a0c14;cursor:pointer;">&times;</button>
        </div>
        <div class="chatbot-messages" id="chatbot-messages"></div>
        <div class="chatbot-input-row">
            <input id="chatbot-input" type="text" placeholder="Nachricht eingeben..." />
            <button id="chatbot-send">Senden</button>
        </div>
    </div>

    <script src="/static/js/main.js?v=1"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
