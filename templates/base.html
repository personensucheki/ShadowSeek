<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}ShadowSeek{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #181a1b;
            color: #f1f1f1;
        }
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #23272a;
            padding: 0 2vw;
            height: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .navbar-logo {
            font-size: 1.5em;
            font-weight: bold;
            color: #8ab4f8;
            letter-spacing: 1px;
            text-decoration: none;
        }
        .navbar-center {
            display: flex;
            gap: 2vw;
        }
        .navbar-center a {
            color: #f1f1f1;
            text-decoration: none;
            font-size: 1em;
            padding: 8px 14px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .navbar-center a:hover {
            background: #31363b;
        }
        .navbar-right {
            position: relative;
        }
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropbtn {
            background: #23272a;
            color: #f1f1f1;
            padding: 8px 16px;
            font-size: 1em;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .dropbtn:after {
            content: '\25BC';
            margin-left: 8px;
            font-size: 0.8em;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background: #23272a;
            min-width: 150px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            z-index: 1;
            border-radius: 0 0 8px 8px;
        }
        .dropdown-content a {
            color: #f1f1f1;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            transition: background 0.2s;
        }
        .dropdown-content a:hover {
            background: #31363b;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }
        @media (max-width: 700px) {
            {% extends "base.html" %}

            {% block title %}ShadowSeek{% endblock %}

            {% block content %}
            <style>
                body {
                    background: radial-gradient(circle at center, #0a0e17 0%, #000 70%);
                    margin: 0;
                    padding: 0;
                    min-height: 100vh;
                    font-family: 'Segoe UI', Arial, sans-serif;
                    color: #f1f1f1;
                    overflow-x: hidden;
                }

                .world-bg {
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: url('/static/img/worldmap.svg') center/cover no-repeat;
                    opacity: 0.18;
                    z-index: -1;
                    pointer-events: none;
                }

                .hero {
                    min-height: 85vh;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    position: relative;
                    z-index: 1;
                }

                .logo {
                    width: 150px;
                    height: 150px;
                    background: linear-gradient(135deg, #00f0ff, #0066ff);
                    border-radius: 26px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-size: 4.8rem;
                    font-weight: 900;
                    color: white;
                    box-shadow: 0 0 80px rgba(0, 240, 255, 0.7);
                    margin-bottom: 20px;
                }

                .slogan {
                    color: #00f0ff;
                    font-size: 1.65rem;
                    font-weight: 600;
                    text-shadow: 0 0 25px rgba(0, 240, 255, 0.6);
                    margin-bottom: 60px;
                    letter-spacing: 1.5px;
                }

                .search-box {
                    width: 100%;
                    max-width: 720px;
                    position: relative;
                }

                .search-input {
                    width: 100%;
                    padding: 24px 28px 24px 70px;
                    font-size: 1.4rem;
                    border-radius: 50px;
                    border: 2px solid rgba(0, 240, 255, 0.25);
                    background: rgba(15, 23, 42, 0.85);
                    color: white;
                    outline: none;
                    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
                }

                .search-input:focus {
                    border-color: #00f0ff;
                    box-shadow: 0 0 0 4px rgba(0, 240, 255, 0.3);
                }

                .search-icon {
                    position: absolute;
                    left: 30px;
                    top: 50%;
                    transform: translateY(-50%);
                    font-size: 1.8rem;
                    color: #00f0ff;
                }

                .search-btn {
                    position: absolute;
                    right: 8px;
                    top: 50%;
                    transform: translateY(-50%);
                    background: linear-gradient(90deg, #00f0ff, #0066ff);
                    color: #0a0c14;
                    border: none;
                    padding: 16px 40px;
                    border-radius: 50px;
                    font-weight: 700;
                    font-size: 1.15rem;
                    cursor: pointer;
                    box-shadow: 0 0 30px rgba(0, 240, 255, 0.6);
                }
            </style>

            <div class="world-bg"></div>

            <div class="hero">
                <div class="logo">SS</div>
                <div class="slogan">Finde, was im Schatten verborgen liegt.</div>
    
                <div class="search-box">
                    <form action="/search" method="get">
                        <span class="search-icon">🔍</span>
                        <input type="text" 
                               class="search-input" 
                               name="q" 
                               placeholder="Wonach suchst du? Name, Username, Ort, Begriff..." 
                               autocomplete="off" 
                               required>
                        <button type="submit" class="search-btn">Suchen</button>
                    </form>
                </div>
            </div>

            {% endblock %}
</html>
