<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}ShadowSeek{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #181a1b;
            color: #f1f1f1;
        }
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #23272a;
            padding: 0 2vw;
            height: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .navbar-logo {
            font-size: 1.5em;
            font-weight: bold;
            color: #8ab4f8;
            letter-spacing: 1px;
            text-decoration: none;
        }
        .navbar-center {
            display: flex;
            gap: 2vw;
        }
        .navbar-center a {
            color: #f1f1f1;
            text-decoration: none;
            font-size: 1em;
            padding: 8px 14px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .navbar-center a:hover {
            background: #31363b;
        }
        .navbar-right {
            position: relative;
        }
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropbtn {
            background: #23272a;
            color: #f1f1f1;
            padding: 8px 16px;
            font-size: 1em;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .dropbtn:after {
            content: '\25BC';
            margin-left: 8px;
            font-size: 0.8em;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background: #23272a;
            min-width: 150px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            z-index: 1;
            border-radius: 0 0 8px 8px;
        }
        .dropdown-content a {
            color: #f1f1f1;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            transition: background 0.2s;
        }
        .dropdown-content a:hover {
            background: #31363b;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }
        @media (max-width: 700px) {
            .navbar {
                flex-direction: column;
                height: auto;
                padding: 1vw;
            }
            .navbar-center {
                flex-direction: column;
                gap: 0.5em;
                width: 100%;
                align-items: center;
                margin: 10px 0;
            }
            .navbar-right {
                width: 100%;
                display: flex;
                justify-content: flex-end;
                margin-bottom: 5px;
            }
        }
        main {
            margin: 40px auto 0 auto;
            max-width: 900px;
            padding: 2vw;
        }
    </style>
</head>
<body>
    <nav style="display:flex; justify-content:space-between; align-items:center; padding:0 40px; height:70px; background:#23272a;">
        <div style="font-size:22px; font-weight:bold; color:#8ab4f8;">ShadowSeek</div>
        
        <div style="display:flex; gap:30px; font-weight:500;">
            <a href="/" style="color:white; text-decoration:none;">Home</a>
            <a href="/search" style="color:white; text-decoration:none;">Suche</a>
            <a href="#" style="color:white; text-decoration:none;">Admin</a>
        </div>

        <div style="display:flex; align-items:center; gap:12px;">
            <!-- Login & Register Buttons -->
            <button onclick="showLoginModal()" 
                    style="background:transparent; color:#8ab4f8; border:1px solid #8ab4f8; padding:9px 20px; border-radius:8px; cursor:pointer; font-weight:500;">
                Anmelden
            </button>
            
            <button onclick="showRegisterModal()" 
                    style="background:#8ab4f8; color:#181a1b; border:none; padding:9px 24px; border-radius:8px; font-weight:bold; cursor:pointer;">
                Registrieren
            </button>

            <!-- Profil Dropdown -->
            <div class="profile-dropdown" style="position:relative;">
                <button onclick="toggleDropdown()" 
                        style="background:transparent; color:white; border:none; display:flex; align-items:center; gap:8px; cursor:pointer;">
                    Profil <span style="font-size:18px;">▼</span>
                </button>
                
                <div id="dropdown-menu" style="display:none; position:absolute; right:0; top:45px; background:#23272a; border-radius:10px; box-shadow:0 10px 20px rgba(0,0,0,0.5); min-width:180px; overflow:hidden;">
                    <a href="#" style="display:block; padding:14px 20px; color:white; text-decoration:none;">Mein Profil</a>
                    <a href="#" style="display:block; padding:14px 20px; color:white; text-decoration:none;">Meine Suchen</a>
                    <a href="#" style="display:block; padding:14px 20px; color:white; text-decoration:none;">Einstellungen</a>
                    <hr style="margin:4px 0; border:none; border-top:1px solid #444;">
                    <a href="#" onclick="logout()" style="display:block; padding:14px 20px; color:#ff5555; text-decoration:none;">Abmelden</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Login Modal -->
    <div id="login-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:2000; align-items:center; justify-content:center;">
        <div style="background:#23272a; width:380px; padding:30px; border-radius:16px;">
            <h2 style="text-align:center; color:#8ab4f8; margin-bottom:24px;">Anmelden</h2>
            <input type="text" placeholder="Username oder E-Mail" style="width:100%; padding:14px; margin:10px 0; background:#181a1b; border:none; border-radius:8px; color:white;">
            <input type="password" placeholder="Passwort" style="width:100%; padding:14px; margin:10px 0; background:#181a1b; border:none; border-radius:8px; color:white;">
            <button style="width:100%; padding:14px; background:#8ab4f8; color:#181a1b; border:none; border-radius:8px; font-weight:bold; margin-top:16px;">Anmelden</button>
            <p onclick="switchToRegister()" style="text-align:center; color:#8ab4f8; margin-top:16px; cursor:pointer;">Noch kein Account? Jetzt registrieren</p>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="register-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:2000; align-items:center; justify-content:center;">
        <div style="background:#23272a; width:380px; padding:30px; border-radius:16px;">
            <h2 style="text-align:center; color:#8ab4f8; margin-bottom:24px;">Registrieren</h2>
            <input type="text" placeholder="Username" style="width:100%; padding:14px; margin:10px 0; background:#181a1b; border:none; border-radius:8px; color:white;">
            <input type="email" placeholder="E-Mail" style="width:100%; padding:14px; margin:10px 0; background:#181a1b; border:none; border-radius:8px; color:white;">
            <input type="password" placeholder="Passwort" style="width:100%; padding:14px; margin:10px 0; background:#181a1b; border:none; border-radius:8px; color:white;">
            <button style="width:100%; padding:14px; background:#8ab4f8; color:#181a1b; border:none; border-radius:8px; font-weight:bold; margin-top:20px;">Konto erstellen</button>
        </div>
    </div>

    <script>
    // Dropdown
    function toggleDropdown() {
        const menu = document.getElementById('dropdown-menu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }

    // Modals
    function showLoginModal() { 
        document.getElementById('login-modal').style.display = 'flex'; 
    }
    function showRegisterModal() { 
        document.getElementById('register-modal').style.display = 'flex'; 
    }
    function switchToRegister() {
        document.getElementById('login-modal').style.display = 'none';
        document.getElementById('register-modal').style.display = 'flex';
    }
    function logout() {
        alert("Du wurdest abgemeldet.");
        location.reload();
    }

    // Klick außerhalb schließt Dropdown
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.profile-dropdown')) {
            document.getElementById('dropdown-menu').style.display = 'none';
        }
    });
    </script>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
