<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}ShadowSeek{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #181a1b;
            color: #f1f1f1;
        }
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #23272a;
            padding: 0 2vw;
            height: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .navbar-logo {
            font-size: 1.5em;
            font-weight: bold;
            color: #8ab4f8;
            letter-spacing: 1px;
            text-decoration: none;
        }
        .navbar-center {
            display: flex;
            gap: 2vw;
        }
        .navbar-center a {
            color: #f1f1f1;
            text-decoration: none;
            font-size: 1em;
            padding: 8px 14px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .navbar-center a:hover {
            background: #31363b;
        }
        .navbar-right {
            position: relative;
        }
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropbtn {
            background: #23272a;
            color: #f1f1f1;
            padding: 8px 16px;
            font-size: 1em;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .dropbtn:after {
            content: '\25BC';
            margin-left: 8px;
            font-size: 0.8em;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background: #23272a;
            min-width: 150px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            z-index: 1;
            border-radius: 0 0 8px 8px;
        }
        .dropdown-content a {
            color: #f1f1f1;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            transition: background 0.2s;
        }
        .dropdown-content a:hover {
            background: #31363b;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }
        @media (max-width: 700px) {
            .navbar {
                flex-direction: column;
                height: auto;
                padding: 1vw;
            }
            .navbar-center {
                flex-direction: column;
                gap: 0.5em;
                width: 100%;
                align-items: center;
                margin: 10px 0;
            }
            .navbar-right {
                width: 100%;
                display: flex;
                justify-content: flex-end;
                margin-bottom: 5px;
            }
        }
        main {
            margin: 40px auto 0 auto;
            max-width: 900px;
            padding: 2vw;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-logo">ShadowSeek</a>
        <div class="navbar-center">
            <a href="/">Home</a>
            <a href="/search">Suche</a>
            <a href="/admin">Admin</a>
        </div>
        <div class="navbar-right">
            <div class="dropdown">
                <button class="dropbtn">Profil</button>
                <div class="dropdown-content">
                    <a href="#">Einstellungen</a>
                    <a href="#">Mein Profil</a>
                    <a href="#">Logout</a>
                </div>
            </div>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
