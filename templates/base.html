<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShadowSeek{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #181a1b;
            color: #f1f1f1;
        }
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #23272a;
            padding: 0 2vw;
            height: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .navbar-logo {
            font-size: 1.6em;
            font-weight: bold;
            color: #00f0ff;
            text-decoration: none;
        }
        .navbar-center {
            display: flex;
            gap: 2vw;
        }
        .navbar-center a {
            color: #f1f1f1;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 4px;
        }
        .navbar-center a:hover {
            background: #31363b;
        }
        .world-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('/static/img/worldmap.svg') center/cover no-repeat;
            opacity: 0.18;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-logo">ShadowSeek</div>
        <div class="navbar-center">
            <a href="/">Home</a>
            <a href="/search">Suche</a>
            <a href="#">Admin</a>
        </div>
        <div class="navbar-right">
            <button onclick="showLoginModal()" style="background:transparent;border:1px solid #00f0ff;color:#00f0ff;">Anmelden</button>
            <button onclick="showRegisterModal()" style="background:#00f0ff;color:#0a0c14;border:none;">Registrieren</button>
        </div>
    </nav>

    <div class="world-bg"></div>

    <main style="padding-top: 90px;">
        {% block content %}{% endblock %}
    </main>

    <script>
    function showLoginModal() { alert("Login Modal kommt später"); }
    function showRegisterModal() { alert("Register Modal kommt später"); }
    </script>
</body>
</html>
