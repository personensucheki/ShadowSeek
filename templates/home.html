{% extends "base.html" %}

{% block title %}ShadowSeek - Startseite{% endblock %}

{% block content %}
<style>
    .ss-home-center {
        min-height: 70vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-top: 5vh;
    }
    .ss-logo {
        width: 120px;
        height: 120px;
        margin-bottom: 28px;
        border-radius: 24px;
        background: linear-gradient(135deg, #23272a 60%, #8ab4f8 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 6px 32px rgba(0,0,0,0.22);
    }
    .ss-logo-text {
        font-size: 2.7em;
        font-weight: bold;
        color: #8ab4f8;
        font-family: 'Segoe UI', Arial, sans-serif;
        letter-spacing: 2px;
        text-shadow: 0 2px 16px #23272a88;
    }
    .ss-slogan {
        color: #aaa;
        font-size: 1.25em;
        margin-bottom: 38px;
        margin-top: 10px;
        text-align: center;
        font-weight: 400;
        letter-spacing: 0.5px;
    }
    .ss-search-form {
        width: 100%;
        max-width: 540px;
        display: flex;
        gap: 0;
        margin-bottom: 18px;
    }
    .ss-search-input {
        flex: 1;
        padding: 20px 22px;
        font-size: 1.25em;
        border-radius: 16px 0 0 16px;
        border: none;
        background: #181a1b;
        color: #f1f1f1;
        outline: none;
        box-shadow: 0 2px 12px #0002;
    }
    .ss-search-input:focus {
        box-shadow: 0 0 0 2px #8ab4f8;
    }
    .ss-search-btn {
        padding: 0 38px;
        font-size: 1.18em;
        border-radius: 0 16px 16px 0;
        border: none;
        background: #8ab4f8;
        color: #181a1b;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.2s;
    }
    .ss-search-btn:hover {
        background: #a6c8fa;
    }
</style>

<div class="ss-home-center">
    <div class="ss-logo">
        <span class="ss-logo-text">SS</span>
    </div>
    <div class="ss-slogan">Finde, was im Schatten verborgen liegt.</div>
    <form class="ss-search-form" action="/search" method="get" autocomplete="off">
        <input class="ss-search-input" type="text" name="username" placeholder="Username, Name, E-Mail..." required>
        <button class="ss-search-btn" type="submit">Suchen</button>
    </form>
</div>
{% endblock %}
</script>

{% endblock %}
