<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>ShadowSeek – Startseite</title>
    <style>
        body { font-family: Arial, sans-serif; background: #181a1b; color: #f1f1f1; text-align: center; margin-top: 10vh; }
        .search-box { margin: 0 auto; max-width: 400px; }
        input[type="text"] { width: 70%; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #444; color: #fff; cursor: pointer; }
        button:hover { background: #222; }
    </style>
</head>
<body>
    <h1>Willkommen bei ShadowSeek</h1>
    <div class="search-box">
        <form action="/search" method="get">
            <input type="text" name="q" placeholder="Suchbegriff eingeben..." required>
            <button type="submit">Suchen</button>
        </form>
    </div>
</body>
</html>
