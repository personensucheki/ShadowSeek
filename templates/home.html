{% extends "base.html" %}

{% block title %}ShadowSeek{% endblock %}

{% block content %}
<style>
    .hero {
        min-height: 85vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0c14;
        position: relative;
        overflow: hidden;
    }
    
    .logo {
        font-size: 5.8rem;
        font-weight: 900;
        letter-spacing: -4px;
        background: linear-gradient(90deg, #00ddff, #4d9fff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 16px;
    }
    
    .tagline {
        color: #8899aa;
        font-size: 1.45rem;
        margin-bottom: 60px;
        font-weight: 400;
    }
    
    .search-box {
        width: 100%;
        max-width: 680px;
        position: relative;
    }
    
    .search-input {
        width: 100%;
        padding: 22px 28px;
        font-size: 1.4rem;
        border-radius: 50px;
        border: 1px solid #334155;
        background: #1f2937;
        color: white;
        outline: none;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
    }
    
    .search-input:focus {
        border-color: #60a5fa;
        box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.25);
    }
    
    .search-btn {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        background: #60a5fa;
        color: #0a0c14;
        border: none;
        padding: 16px 36px;
        border-radius: 50px;
        font-weight: 700;
        font-size: 1.15rem;
        cursor: pointer;
    }
</style>

<div class="hero">
    <h1 class="logo">ShadowSeek</h1>
    <p class="tagline">Privat. Sicher. Ohne Tracking.</p>
    
    <div class="search-box">
        <form action="/search" method="get">
            <input type="text" 
                   class="search-input" 
                   name="q" 
                   placeholder="Wonach suchst du?" 
                   autocomplete="off" 
                   required>
            <button type="submit" class="search-btn">Suchen</button>
        </form>
    </div>
</div>

{% endblock %}
