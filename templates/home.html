{% extends "base.html" %}

{% block title %}ShadowSeek - Personen Suche{% endblock %}

{% block content %}
<h1 style="text-align:center; color:#00f0ff; margin:60px 0 30px; font-size:3em;">ShadowSeek</h1>
<p style="text-align:center; color:#94a3b8; font-size:1.3em; margin-bottom:50px;">Finde Profile auf Social Media, OnlyFans & mehr</p>

<div style="max-width:680px; margin:0 auto; background:#1e2937; padding:40px; border-radius:16px;">
    <form method="POST" action="/search">
        <input type="text" name="username" placeholder="Username eingeben (z.B. maxmustermann)" 
               style="width:100%; padding:18px; background:#334155; border:none; border-radius:12px; color:white; font-size:1.15em;" required>
        
        <button type="submit" style="width:100%; margin-top:20px; padding:18px; background:#00f0ff; color:#0a0c14; border:none; border-radius:12px; font-size:1.2em; font-weight:bold;">
            Suche starten
        </button>
    </form>
</div>

<!-- Chatbot bleibt hier -->
<button id="chat-toggle" style="position:fixed; bottom:30px; right:30px; width:68px; height:68px; border-radius:50%; background:#00f0ff; color:#0a0c14; border:none; font-size:28px; box-shadow:0 0 30px rgba(0,240,255,0.7); cursor:pointer;">💬</button>

<div id="chat-window" style="display:none; position:fixed; bottom:115px; right:30px; width:360px; height:520px; background:#1e2838; border-radius:16px; box-shadow:0 12px 40px rgba(0,0,0,0.7); overflow:hidden; border:1px solid #334155;">
    <div style="background:linear-gradient(90deg,#00f0ff,#4d9fff); color:#0a0c14; padding:16px; font-weight:bold; display:flex; justify-content:space-between;">
        ShadowSeek Assistant
        <span onclick="document.getElementById('chat-window').style.display='none'" style="cursor:pointer; font-size:24px;">×</span>
    </div>
    <div id="chat-messages" style="height:380px; overflow-y:auto; padding:20px; background:#16213a; color:#e0e0e0;"></div>
    <div style="padding:14px; background:#1e2838; border-top:1px solid #334155; display:flex;">
        <input id="chat-input" type="text" placeholder="Frag mich was..." style="flex:1; padding:14px; border:none; border-radius:12px; background:#0f1829; color:white;">
        <button id="chat-send" style="margin-left:8px; padding:14px 24px; background:#00f0ff; color:#0a0c14; border:none; border-radius:12px; font-weight:bold;">Senden</button>
    </div>
</div>

<script>
// Chatbot-Code hier einfügen (den du schon hast)
</script>
{% endblock %}
