
{% extends "base.html" %}

{% block title %}ShadowSeek - Personen Suche{% endblock %}

{% block content %}
<div style="min-height:100vh; background:#0f172a; color:white; font-family:Arial, sans-serif; padding:40px 20px;">
	<h1 style="text-align:center; color:#00f0ff; margin-bottom:40px;">ShadowSeek</h1>
    
	<div style="max-width:700px; margin:0 auto; background:#1e2937; padding:30px; border-radius:16px;">
		<form method="POST" action="/search">
			<input type="text" name="username" placeholder="Username (z.B. maxmustermann)" 
				   style="width:100%; padding:14px; margin:10px 0; background:#334155; border:none; border-radius:8px; color:white;" required>
            
			<button type="submit" 
					style="width:100%; padding:16px; background:#00f0ff; color:#0a0c14; border:none; border-radius:8px; font-weight:bold; font-size:1.1em;">
				Jetzt suchen
			</button>
		</form>
	</div>
</div>
{% endblock %}
