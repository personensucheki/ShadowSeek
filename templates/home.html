{% extends "base.html" %}

{% block title %}ShadowSeek{% endblock %}

{% block content %}
<style>
    .home-bg {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at center, #0a0e17 0%, #000 70%);
        overflow: hidden;
        z-index: -2;
    }
    .world-map {
        position: absolute;
        inset: 0;
        background: url('https://i.imgur.com/5Z3Z2vL.png') center/cover no-repeat;
        opacity: 0.12;
        z-index: -1;
    }
    .home-container {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 1;
        padding: 20px;
    }
    .logo {
        width: 140px;
        height: 140px;
        background: linear-gradient(135deg, #00f0ff, #0066ff);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 4.5rem;
        font-weight: 900;
        color: white;
        box-shadow: 0 0 60px rgba(0, 240, 255, 0.6);
        margin-bottom: 30px;
        z-index: 2;
    }
    .slogan {
        color: #00f0ff;
        font-size: 1.6rem;
        font-weight: 600;
        text-shadow: 0 0 20px rgba(0, 240, 255, 0.7);
        margin-bottom: 50px;
        letter-spacing: 2px;
    }
    .search-container {
        width: 100%;
        max-width: 680px;
        position: relative;
    }
    .search-input {
        width: 100%;
        padding: 22px 28px;
        font-size: 1.35rem;
        border-radius: 50px;
        border: none;
        background: rgba(15, 23, 42, 0.85);
        color: white;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px rgba(0, 240, 255, 0.15);
        outline: none;
    }
    .search-btn {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        background: linear-gradient(90deg, #00f0ff, #0066ff);
        color: white;
        border: none;
        padding: 16px 36px;
        border-radius: 50px;
        font-weight: bold;
        font-size: 1.1rem;
        cursor: pointer;
        box-shadow: 0 0 25px rgba(0, 240, 255, 0.5);
    }
</style>

<div class="home-bg">
    <div class="world-map"></div>
</div>

<div class="home-container">
    <div class="logo">SS</div>
    <div class="slogan">Finde, was im Schatten verborgen liegt.</div>
    
    <div class="search-container">
        <form action="/search" method="get">
            <input type="text" 
                   class="search-input" 
                   name="q" 
                   placeholder="Username, Name, E-Mail, Ort..." 
                   autocomplete="off" 
                   required>
            <button type="submit" class="search-btn">Suchen</button>
        </form>
    </div>
</div>

{% endblock %}
